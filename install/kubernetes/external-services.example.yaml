apiVersion: v1
kind: Secret
metadata:
  name: cube-db-secret
  namespace: infra
type: Opaque
stringData:
  # 二选一：MySQL(3306) 或 PostgreSQL(5432)
  DB_HOST: "mysql.company.local"
  DB_PORT: "3306"
  DB_NAME: "cube_studio"
  DB_USER: "cube_studio"
  DB_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: cube-redis-secret
  namespace: infra
type: Opaque
stringData:
  REDIS_HOST: "redis.company.local"
  REDIS_PORT: "6379"
  REDIS_DB: "12"
  REDIS_PASSWORD: "REPLACE_ME"
  REDIS_KEY_PREFIX: "cube-studio:"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cube-external-services
  namespace: infra
data:
  ES_HOSTS: "http://es.company.local:9200"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-01:9092,kafka-02:9092,kafka-03:9092"
  PROMETHEUS_URL: "http://prometheus.company.local"
  GRAFANA_URL: "http://grafana.company.local"
  HDFS_NAMESERVICE: "nameservice1"
  HDFS_BASE_PATH: "hdfs://nameservice1/ml"
  HARBOR_REGISTRY: "harbor.company.com"
  # LiteLLM 网关：所有 OpenAI 兼容请求走它，避免每个推理服务镜像各自配 OpenAI key。
  # 推理服务环境变量里把 OPENAI_API_BASE 指向这个地址即可。
  LITELLM_BASE_URL: "http://litellm.company.local"
  # 可选：cube-studio 内部默认的 OpenAI 兼容入口（与 LITELLM_BASE_URL 同值即可）
  OPENAI_API_BASE: "http://litellm.company.local/v1"
---
apiVersion: v1
kind: Secret
metadata:
  name: cube-litellm-secret
  namespace: infra
type: Opaque
stringData:
  # LiteLLM 颁发的 master / virtual key；推理服务镜像通过 OPENAI_API_KEY 透传
  LITELLM_API_KEY: "REPLACE_ME"
