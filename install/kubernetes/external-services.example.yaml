apiVersion: v1
kind: Secret
metadata:
  name: cube-db-secret
  namespace: infra
type: Opaque
stringData:
  # 二选一：MySQL(3306) 或 PostgreSQL(5432)
  DB_HOST: "mysql.company.local"
  DB_PORT: "3306"
  DB_NAME: "cube_studio"
  DB_USER: "cube_studio"
  DB_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: cube-redis-secret
  namespace: infra
type: Opaque
stringData:
  REDIS_HOST: "redis.company.local"
  REDIS_PORT: "6379"
  REDIS_DB: "12"
  REDIS_PASSWORD: "REPLACE_ME"
  REDIS_KEY_PREFIX: "cube-studio:"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cube-external-services
  namespace: infra
data:
  ES_HOSTS: "http://es.company.local:9200"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-01:9092,kafka-02:9092,kafka-03:9092"
  PROMETHEUS_URL: "http://prometheus.company.local"
  GRAFANA_URL: "http://grafana.company.local"
  HDFS_NAMESERVICE: "nameservice1"
  HDFS_BASE_PATH: "hdfs://nameservice1/ml"
  HARBOR_REGISTRY: "harbor.company.com"
